<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!--<link rel="stylesheet" href="/style.css"/>-->
    <title>Wails App</title>
</head>
<body>
    <button id="btn-greet" data-cmd="hello">#1. Say Hello</button>
    <button id="btn-test" data-cmd="test">#2. Run Test</button>
    <br>
    <textarea id="TestStringLandingHTMLID" rows="10" cols="80"></textarea><br>
    <textarea id="PseudoConsoleHTMLID" rows="10" cols="80"></textarea>   

    <script type="module">
        import { CallGo as InternalCall } from './bindings/changeme/app.js';

        // Your "Internal" bridge wrapper
        const CallGo = async (cmd, data = {}) => {
            try {
                return await InternalCall(cmd, data);
            } catch (err) {
                console.error("Bridge Error:", err);
            }
        };

        // --- THE DISPATCHER ---
        document.addEventListener('click', async (event) => {
            // Check if the clicked element has our custom data-cmd attribute
            const cmd = event.target.dataset.cmd;
            if (!cmd) return; // Ignore clicks on non-buttons

            // Centralized Logic based on the command
            if (cmd === "hello") {
                const out = await CallGo("hello", { name: "Juan" });
                document.getElementById("TestStringLandingHTMLID").value = out;
            } 
            
            if (cmd === "test") {
                const out = await CallGo("test");
                document.getElementById("PseudoConsoleHTMLID").value += `\n[Test]: ${out}`;
            }
        });
    </script>
</body>
</html>
