<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!--<link rel="stylesheet" href="/style.css"/>-->
    <title>Wails App</title>
</head>
<body>
    <button onclick="SayHello()">#1. Say Hello</button><br>

        <textarea id="TestStringLandingHTMLID" rows="10" cols="80"></textarea><br>
     <textarea id="PseudoConsoleHTMLID" rows="10" cols="80"></textarea>   

<script type="module">
    // 1. Import the generated binding. 
    // Note: Wails v3 usually names the folder after your project name or "main"
    import { CallGo as InternalCall } from './bindings/changeme/app.js';

    /**
     * (A) Your Bridge: Now even simpler.
     * We just pass a command name and a single data object.
     */
    const CallGo = async (cmd, data = {}) => {
        try {
            return await InternalCall(cmd, data);
        } catch (err) {
            console.error("Bridge Error:", err);
            document.getElementById("PseudoConsoleHTMLID").value += `\nError: ${err}`;
        }
    };

    /**
     * (B) Your Logic: Clean and readable.
     */
    async function SayHello() {
        // We send "hello" as the cmd, and an object with the data
        let out = await CallGo("hello", { name: "Juan" });
        
        document.getElementById("TestStringLandingHTMLID").value = out;
        document.getElementById("PseudoConsoleHTMLID").value += `\n[System]: Received "${out}"`;
    }

    // (C) Expose to the window so the 'onclick' attribute can see it
    window.SayHello = SayHello; 
</script>
</body>
</html>
